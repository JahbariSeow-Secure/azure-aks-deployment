name: Deploy Azure Function (.NET 8 Isolated)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - List all files
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== All files in root ==="
          ls -la
          echo ""
          echo "=== Looking for .csproj files ==="
          find . -name "*.csproj" -type f

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore leeplat-func.csproj

      - name: Build
        run: dotnet build leeplat-func.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish leeplat-func.csproj --configuration Release --output ./publish --no-build

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App
        uses: azure/functions-action@v1
        with:
          app-name: 'funcleeplatcore'
          package: ./publish
